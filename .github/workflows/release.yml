name: Release

on:
  release:
    types:
      - published

env:
  DEFAULT_PYTHON: "3.14"

permissions:
  contents: read

jobs:
  build:
    name: Build release assets
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Check out code from Github
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python ${{ env.DEFAULT_PYTHON }}
        id: python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
          check-latest: true
      - name: Install requirements
        run: |
          # Remove dist, build, and pylint.egg-info
          # when building locally for testing!
          python -m pip install build
      - name: Build distributions
        run: |
          python -m build
      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: dist/

  release-pypi:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    needs: ["build"]
    environment:
      name: PyPI
      url: https://pypi.org/project/pylint/
    permissions:
      id-token: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: dist/
      - name: Upload to PyPI
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  release-github:
    name: Upload assets to Github release
    runs-on: ubuntu-latest
    needs: ["build"]
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: dist/
      - name: Sign the dists with Sigstore and upload assets to Github release
        if: github.event_name == 'release'
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1 # v3.4.0
        with:
          inputs: |
            ./dist/*.tar.gz
            ./dist/*.whl
