name: Pyreverse Primer / Run

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled, reopened]
    paths:
      - "pylint/pyreverse/**"
      - "pylint/testutils/_primer/**"
      - "tests/primer/pyreverse_primer.py"
      - "tests/primer/test_primer_stdlib.py"
      - "tests/pyreverse/**"
      - "requirements*"
      - ".github/workflows/pyreverse_primer*.yaml"
      - "!.github/workflows/pyreverse_primer_run_main.yaml"
      - "!.github/workflows/pyreverse_primer_comment.yaml"
      - "!tests/primer/packages_to_prime.json"
      - "!tests/primer/pyreverse_targets_to_prime.json"
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CACHE_VERSION: 1
  KEY_PREFIX: venv-pyreverse-primer
  DEFAULT_PYTHON: "3.13"

permissions:
  contents: read

jobs:
  run-primer:
    if: contains(github.event.pull_request.labels.*.name, 'pyreverse')
    name: Run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python ${{ env.DEFAULT_PYTHON }}
        id: python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
          check-latest: true
      - name: Restore Python virtual environment
        id: cache-venv
        uses: actions/cache/restore@v5.0.4
        with:
          path: venv
          key: >-
            ${{ runner.os }}-${{ steps.python.outputs.python-version }}-${{
            env.KEY_PREFIX }}-${{ env.CACHE_VERSION }}-${{ hashFiles('pyproject.toml',
            'requirements_test.txt', 'requirements_test_min.txt',
            'requirements_test_pre_commit.txt') }}
      - name: Create Python virtual environment
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv venv
          . venv/bin/activate
          python -m pip install --upgrade pip
          pip install --upgrade --requirement requirements_test.txt
      - name: Save Python virtual environment
        if: steps.cache-venv.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5.0.4
        with:
          path: venv
          key: >-
            ${{ runner.os }}-${{ steps.python.outputs.python-version }}-${{
            env.KEY_PREFIX }}-${{ env.CACHE_VERSION }}-${{ hashFiles('pyproject.toml',
            'requirements_test.txt', 'requirements_test_min.txt',
            'requirements_test_pre_commit.txt') }}
      - name: Download last main run info
        id: download-main-run
        uses: actions/github-script@v8.0.0
        with:
          script: |
            const fs = require('fs');
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '.github/workflows/pyreverse_primer_run_main.yaml',
              status: 'success'
            });
            const lastRunMain = runs.data.workflow_runs.reduce((prev, current) =>
              prev.run_number > current.run_number ? prev : current
            );
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: lastRunMain.id,
            });
            for (const artifactName of ['pyreverse_primer_commitstring', 'pyreverse_primer_output_main']) {
              const [artifact] = artifacts.data.artifacts.filter((candidate) => candidate.name === artifactName);
              const downloaded = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
                archive_format: 'zip',
              });
              fs.writeFileSync(`${artifactName}.zip`, Buffer.from(downloaded.data));
            }
            return lastRunMain.head_sha;
      - name: Copy and unzip the commit string
        run: |
          unzip pyreverse_primer_commitstring.zip
          cp commit_string_${{ env.DEFAULT_PYTHON }}.txt tests/.pyreverse_primer_tests/commit_string_${{ env.DEFAULT_PYTHON }}.txt
      - name: Unzip the output of main
        run: |
          unzip pyreverse_primer_output_main.zip
      - name: Get commit string
        id: commitstring
        run: |
          . venv/bin/activate
          output=$(python tests/primer/pyreverse_primer.py prepare --read-commit-string)
          echo "commitstring=$output" >> $GITHUB_OUTPUT
      - name: Restore projects cache
        id: cache-projects
        uses: actions/cache/restore@v5.0.4
        with:
          path: tests/.pylint_primer_tests/
          key: >-
            ${{ runner.os }}-${{ env.DEFAULT_PYTHON }}-${{
            steps.commitstring.outputs.commitstring }}-pyreverse-primer
      - name: Regenerate cache
        if: steps.cache-projects.outputs.cache-hit != 'true'
        run: |
          . venv/bin/activate
          python tests/primer/pyreverse_primer.py prepare --clone
      - name: Save projects cache
        if: steps.cache-projects.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5.0.4
        with:
          path: tests/.pylint_primer_tests/
          key: >-
            ${{ runner.os }}-${{ env.DEFAULT_PYTHON }}-${{
            steps.commitstring.outputs.commitstring }}-pyreverse-primer
      - name: Check cache
        run: |
          . venv/bin/activate
          python tests/primer/pyreverse_primer.py prepare --check
      - name: Pull main
        run: |
          git config user.email "primer@example.com"
          git config user.name "Pylint Primer"
          git pull origin ${{ steps.download-main-run.outputs.result }} --no-edit --no-commit --no-rebase
      - name: Run pyreverse primer
        run: |
          . venv/bin/activate
          pip install . --no-deps
          python tests/primer/pyreverse_primer.py run --type=pr
      - name: Upload output of PR
        uses: actions/upload-artifact@v7.0.0
        with:
          name: pyreverse_primer_output_pr
          path:
            tests/.pyreverse_primer_tests/pyreverse_output_${{ env.DEFAULT_PYTHON
            }}_pr.txt
      - name: Upload output of main
        uses: actions/upload-artifact@v7.0.0
        with:
          name: pyreverse_primer_output_main
          path: pyreverse_output_${{ env.DEFAULT_PYTHON }}_main.txt
      - name: Save PR number
        run: |
          echo ${{ github.event.pull_request.number }} | tee pr_number.txt
      - name: Upload PR number
        uses: actions/upload-artifact@v7.0.0
        with:
          name: pr_number
          path: pr_number.txt
